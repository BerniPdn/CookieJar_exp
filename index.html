<!DOCTYPE html>
<html>

<head>
    <title>Experimento CookieJar</title>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@2.0.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet">
    <script src="runtime.js"></script>
    <script src="recorder.js"></script>
</head>

<body>
    <script>

        const jsPsych = initJsPsych();
        //Seguro anti-cierre de pestaña
        window.addEventListener('beforeunload', function (e) {
            if (jsPsych.getProgress().current_trial_global < 16) e.preventDefault();
        });
        
        if (!run_id) {
            console.warn("ALERTA: No se detectó ningún 'run-id' en la URL. Las llamadas a la API van a fallar.");
            
            //Aviso al paciente para que el experimento no corra - poco probable que esto pase
            document.body.innerHTML = `
                <div style="text-align: center; margin-top: 100px; font-family: sans-serif; padding: 20px;">
                    <h2 style="color: #cc0000;">Error de inicialización</h2>
                    <p style="font-size: 1.1rem; color: #333;">El experimento no se inició a través de la plataforma Datapruebas (en este caso mi servidor).</p>
                    <p style="color: #666;">Por favor, vuelve a ingresar desde el panel de paciente de la plataforma.</p>
                </div>
            `;
            throw new Error("Ejecución detenida: Falta run-id en la URL.");

        }
       
        //
        // Helpers
        //

        /**
         * Crea un trial de jsPsych que muestra una imagen de estímulo, 
         * Inicia la grabación de audio/video y maneja el temporizador.
         * @param {string} src - Dirección URL o ruta local de la imagen a utilizar.
         * @param {string|null} [nombreArchivo=null] - Nombre base con el que se guardará el video en el servidor.
         * @param {number} tiempo - Tiempo máximo en segundos que dura el trial antes de terminarse.
         * @returns {Object} Devuelve el objeto de configuración del trial para el timeline de jsPsych.
         */
        function crearTrialImagen(src, nombreArchivo = null, tiempo) {
            return {
                type: jsPsychHtmlButtonResponse,
                stimulus: /*html*/ `
                    <div style="width: 100%; max-width: 700px; margin: 0 auto 30px auto; text-align: center;">
                        <h2 style="margin: 0; display: inline-block;">Imagen a utilizar</h2>
                    </div>
                    
                    <div style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
                        <span id="timer-display" style="font-size: 1.25rem; font-weight: bold; background: #eee; padding: 8px 15px; border-radius: 5px; color: #333; white-space: nowrap; border: 1px solid #ccc;">
                            Tiempo restante: ${tiempo}s
                        </span>
                    </div>

                    <img src="${src}" style="width: 700px; border-radius: 10px; margin: 20px 0;">

                    <div style="margin-top: 20px;">
                         <button type="button" id="btn-enviar-custom" class="jspsych-btn">Enviar</button>
                    </div>
                `,
                choices: [],
                on_load: () => { 
                    comenzarGrabacion()
                    iniciarTimerVisual(tiempo, nombreArchivo);
                    document.getElementById('btn-enviar-custom').addEventListener('click', function(e) {
                        e.preventDefault()
                        this.disabled = true;
                        this.textContent = "Enviando..."
                        frenarYEnviarServidor(nombreArchivo);
                    });
                },
            }
        }

        /**
         * Crea un trial de jsPsych para la tarea de memoria autobiográfica situada.
         * Inicia la grabación, maneja el temporizador visual y guarda metadatos específicos del período.
         * @param {string} nombreArchivo - Nombre base con el que se guardará el video en el servidor.
         * @param {string} periodo - El período de tiempo solicitado (ej: 'la niñez', 'el último año').
         * @param {number} tiempo - Tiempo máximo en segundos que dura el relato antes de terminarse.
         * @returns {Object} Devuelve el objeto de configuración del trial para el timeline de jsPsych.
         */
        function crearTrialMemoria(nombreArchivo, periodo, tiempo) {
            return {
                type: jsPsychHtmlButtonResponse,
                stimulus: /*html*/ `
                    <div style="width: 100%; max-width: 700px; margin: 0 auto 30px auto; text-align: center;">
                        <h2 style="margin: 0; display: inline-block;">Memoria autobiografica situada en ${periodo}</h2>
                    </div>

                    <div style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
                        <span id="timer-display" style="font-size: 1.25rem; font-weight: bold; background: #eee; padding: 8px 15px; border-radius: 5px; color: #333; white-space: nowrap; border: 1px solid #ccc;">
                            Tiempo restante: ${tiempo}s
                        </span>
                    </div>

                    <p style="text-align: center; margin-top: 20px;"> ¿Puedes contarnos sobre un evento en un lugar y tiempo especifico situado en: ${periodo}? </p>
                    
                    <div style="margin-top: 20px;">
                        <button type="button" id="btn-enviar-custom" class="jspsych-btn">Enviar</button>
                    </div>
                `,
                choices: [],
                data: { trial_id: nombreArchivo, periodo_solicitado: periodo },
                on_load: () => { 
                    comenzarGrabacion()
                    iniciarTimerVisual(tiempo, nombreArchivo);
                    document.getElementById('btn-enviar-custom').addEventListener('click', function(e) {
                        e.preventDefault()
                        this.disabled = true;
                        this.textContent = "Enviando..."
                        frenarYEnviarServidor(nombreArchivo);
                    });
                }
            };
        }

        /**
         * Crea un trial de jsPsych estático para mostrar pantallas de instrucciones o textos informativos.
         * @param {string} titulo - El título principal
         * @param {string[]} parrafos - Un arreglo de strings, donde cada elemento es un párrafo o instrucción.
         * @param {string} [boton='Entendido, continuar'].
         * @returns {Object} Devuelve el objeto de configuración del trial para el timeline de jsPsych.
         */
        function crearInstrucciones(titulo, parrafos, boton = 'Entendido, continuar') {
            const items = parrafos.map((p, i) => `<p>${i + 1}. ${p}</p>`).join('');
            return {
                type: jsPsychHtmlButtonResponse,
                stimulus: `<h2>${titulo}</h2>${items}`,
                choices: [boton]
            };
        }
        /**
         * Crea un trial unificado de evaluación emocional (Valencia y Arousal) utilizando emojis modernos.
         * @param {string} [fase='post_bombero_oasis_strict'] - Etiqueta para identificar la fase en la base de datos.
         * @returns {Object} Configuración del trial para el timeline de jsPsych.
         */
        function crearTrialEvaluacionEmocional(fase = 'post_bombero_oasis_strict') {
            return {
                type: jsPsychHtmlButtonResponse,
                stimulus: function() {
                    
                    if (!document.getElementById('oasis-styles')) {
                        const styleNode = document.createElement('style');
                        styleNode.id = 'oasis-styles';
                        styleNode.innerHTML = `
                            .o-con { font-family: 'Segoe UI', -apple-system, sans-serif; max-width: 850px; margin: 0 auto; text-align: center; padding: 10px; }
                            .o-title { color: #1e293b; margin-bottom: 35px; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }
                            .o-card { background: #ffffff; padding: 30px 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; margin-bottom: 40px; }
                            .o-h3 { color: #0f172a; margin: 0 0 8px 0; font-size: 1.4rem; font-weight: 700; }
                            .o-p { color: #64748b; margin: 0 0 25px 0; font-size: 1.05rem; font-weight: 500; }
                            .o-grid { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
                            .o-label { flex: 1; text-align: center; cursor: pointer; padding: 12px 4px; border-radius: 12px; transition: background 0.2s; }
                            .o-emoji { font-size: 1.8rem; display: block; margin-bottom: 8px; }
                            .o-radio { margin-bottom: 12px; transform: scale(1.3); }
                            .o-txt { font-size: 0.75rem; color: #1e293b; display: block; line-height: 1.2; }
                        `;
                        document.head.appendChild(styleNode);
                    }
                    const val_opciones = [
                        ["🤬", "Muy malo /", "negativo"], ["😟", "Bastante", "malo"], ["🙁", "Un poco", "malo"],
                        ["😐", "Neutro", ""], ["🙂", "Un poco", "bueno"], ["😀", "Bastante", "bueno"], ["🚀", "Muy bueno /", "positivo"]
                    ];
                    
                    const aro_opciones = [
                        ["😴", "Muy bajo", "(Calmo)"], ["🥱", "Bastante", "bajo"], ["☕", "Un poco", "bajo"],
                        ["🧘", "Ni bajo", "ni alto"], ["👀", "Un poco", "alto"], ["🔥", "Bastante", "alto"], ["💥", "Muy alto", "(Activado)"]
                    ];

                    const genColumnas = (name, opciones) => opciones.map((opt, i) => `
                        <label class="o-label">
                            <span class="o-emoji">${opt[0]}</span>
                            <input type="radio" name="${name}" value="${i+1}" class="o-radio"><br>
                            <span class="o-txt" style="font-weight: ${i===0||i===3||i===6 ? '700':'500'};">
                                ${opt[1]}${opt[2] ? '<br>'+opt[2] : ''}
                            </span>
                        </label>
                    `).join('');

                    return `
                    <div class="o-con">
                        <h2 class="o-title">Evaluación Emocional</h2>
                        <form id="oasis-form">
                            <div class="o-card">
                                <h3 class="o-h3">VALENCIA</h3>
                                <p class="o-p">¿Cómo describirías tu estado de ánimo en este preciso momento?</p>
                                <div class="o-grid">
                                    ${genColumnas('oasis_valence', val_opciones)}
                                </div>
                            </div>
                            <div class="o-card" style="margin-bottom: 35px;">
                                <h3 class="o-h3">ACTIVACIÓN</h3>
                                <p class="o-p">¿Cómo sentís tu nivel de energía o activación corporal en este preciso momento?</p>
                                <div class="o-grid">
                                    ${genColumnas('oasis_arousal', aro_opciones)}
                                </div>
                            </div>
                        </form>
                    </div>`;
                },
                choices: ['Guardar y continuar'], 
                on_load: function() {
                    const btnEnviar = document.querySelector('.jspsych-btn');
                    
                    if (btnEnviar) {
                        btnEnviar.disabled = true;
                        btnEnviar.style.opacity = '0.5';
                        btnEnviar.style.cursor = 'not-allowed';
                    }

                    function validarRespuestas() {
                        const btnEnviar = document.querySelector('.jspsych-btn');

                        const v_checked = document.querySelector('input[name="oasis_valence"]:checked');
                        const a_checked = document.querySelector('input[name="oasis_arousal"]:checked');
                        
                        if (btnEnviar) {
                            if (v_checked && a_checked) {
                                btnEnviar.disabled = false;
                                btnEnviar.style.opacity = '1';
                                btnEnviar.style.cursor = 'pointer';
                            } else {
                                btnEnviar.disabled = true;
                                btnEnviar.style.opacity = '0.5';
                                btnEnviar.style.cursor = 'not-allowed';
                            }
                        }
                    }
                                        
                    document.querySelectorAll('#oasis-form .o-label').forEach(label => {
                        label.addEventListener('mouseenter', () => label.style.background = '#f1f5f9');
                        label.addEventListener('mouseleave', () => {
                            const radio = label.querySelector('input');
                            if (radio && !radio.checked) label.style.background = 'transparent';
                        });
                        label.addEventListener('click', () => {
                            const radio = label.querySelector('input');
                            const name = radio.name;
                            
                            document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
                                const parent = r.closest('.o-label');
                                parent.style.background = 'transparent';
                                parent.style.boxShadow = 'none';
                            });

                            radio.checked = true;

                            label.style.background = '#e2e8f0';
                            label.style.boxShadow = '0 2px 8px rgba(0,0,0,0.05)';

                            validarRespuestas();
                        });
                    });
                },
                on_finish: function(data) {
                    const v_selected = document.querySelector('input[name="oasis_valence"]:checked');
                    const a_selected = document.querySelector('input[name="oasis_arousal"]:checked');
                    data.oasis_valence = v_selected ? parseInt(v_selected.value) : null;
                    data.oasis_arousal = a_selected ? parseInt(a_selected.value) : null;
                    data.fase = fase;
                }
            };
        }
        //
        // Trials estaticos
        //
        const bienvenida = {
            type: jsPsychHtmlButtonResponse,
            stimulus: /*html*/ `
                <h2>¡Te damos la bienvenida al experimento!</h2>
                <h3>Este experimento consiste de 3 partes. Para evitar distracciones te pedimos que:</h3>
                <p><b>1.</b> Cierres otras pesatañas y aplicaciones que generen notificaciones</p>
                <p><b>2.</b> Pongas el telefono en modo no molestar</p>
                <p><b>3.</b> Minimices distracciones de tu entorno, intenando estar en un lugar tranquilo</p>
            `,
            choices: ['Siguiente']
        }

        const pantalla = {
            type: jsPsychFullscreen,
            fullscreen_mode: true,
            message: '<h3>El experimento ira a pantalla completa cuando presiones el boton que se encuentra abajo</h3>',
            button_label: 'Ir a pantalla completa'
        }

        const calibracion = {
            type: jsPsychHtmlButtonResponse,
            stimulus: /*html*/ `
                <h2>Verificación de micrófono</h2>
                <p>Hablá en voz alta y fijate que la barra se mueva. Si la barra no se mueve intenta hablar un poco mas fuerte.</p> 
                <div style="width: 600px; margin: 20px auto;">
                    <div id="barra-container" style="background: #eee; border-radius: 8px; height: 50px; overflow: hidden;">
                        <div id="barra-audio" style="height: 100%; width: 0%; background: green; transition: width 0.1s;"></div>
                    </div>
                </div>

                <br> 

                <h2>Verificación de cámara</h2>
                <p>Asegurate que tu cara este en el cuadrado verde que aparece en la pantalla de abajo e intenta no moverte
                    mucho durante el experimento</p>
                    
                    <div id="contenedor-camara"
                        style="
                            position: relative;
                            width: 600px;
                            height: 375px;
                            margin: 0 auto;
                            background: #ddd;
                            border-radius: 8px;
                            overflow: hidden;
                        ">

                        <video id="preview-camara" 
                            autoplay 
                            muted 
                            playsinline
                            style="
                                width: 100%;
                                height: 100%;
                                object-fit: cover;
                                visibility: hidden;
                            ">
                        </video>

                        <div id="cuadrado-camara" 
                            style="
                                position: absolute;
                                top: 50%;
                                left: 50%;
                                width: 300px;
                                height: 300px;
                                border: 4px solid green;
                                transform: translate(-50%, -50%);
                                border-radius: 10px;
                                pointer-events: none;
                                display: none;
                            ">
                        </div>

                    </div>

                <p id="estado-mic-cam" style="color: gray;">Iniciando micrófono y camara...</p>
                <button id="btn-calibracion" class="jspsych-btn" disabled>
                    Calibración de audio y cámara lista
                </button>
            `,
            choices: [],

            on_load: function () {
                navigator.mediaDevices.getUserMedia({ audio: true, video: true })
                    .then(function (stream) {
                        document.getElementById('estado-mic-cam').textContent = 'Micrófono y camara activos.';
                        document.getElementById('estado-mic-cam').style.color = 'green';
                        document
                            .getElementById('btn-calibracion')
                            .addEventListener('click', function () {
                                jsPsych.finishTrial();
                            });

                        const video = document.getElementById('preview-camara');
                        video.srcObject = stream;
                        video.onloadedmetadata = function () {
                            video.style.visibility = 'visible';
                            document.getElementById('cuadrado-camara').style.display = 'block';
                        };

                        const audioContext = new AudioContext();
                        const source = audioContext.createMediaStreamSource(stream);
                        const analyser = audioContext.createAnalyser();
                        analyser.fftSize = 256;
                        source.connect(analyser);

                        const dataArray = new Uint8Array(analyser.frequencyBinCount);

                        // Calibracion del audio
                        let volumenSuave = 0;
                        function updateBar() {
                            const barra = document.getElementById('barra-audio');
                            if (!barra) return;
                           
                            analyser.getByteTimeDomainData(dataArray);
                        
                            let sumSquaredDifferences = 0;
                            for (let i = 0; i < dataArray.length; i++) {
                                const dev = dataArray[i] - 128;
                                sumSquaredDifferences += dev * dev;
                            }
                            
                            const meanSquare = sumSquaredDifferences / dataArray.length;
                            const rms = Math.sqrt(meanSquare);

                            const porcentajeInstantaneo = Math.max(0, Math.min(rms * 2.8, 100));
                            const factorSuavizado = 0.15;
                            volumenSuave = (volumenSuave * (1 - factorSuavizado)) + (porcentajeInstantaneo * factorSuavizado);

                            barra.style.width = volumenSuave + '%';

                            //Habilitar boton si el promedio se mueve bien con la voz
                            if (volumenSuave > 25) {
                                document.getElementById('btn-calibracion').disabled = false;
                            }

                            requestAnimationFrame(updateBar);
                        }
                        updateBar();
                        inicializarGrabador(stream);
                    })
                    .catch(function () {
                        document.getElementById('estado-mic-cam').textContent = 
                            'No se pudo acceder al micrófono y/o la camara. Revisá los permisos.';
                        document.getElementById('estado-mic-cam').style.color = 'red';
                    });
            }
        }
        
        //
        //Configuracion de las plantillas de instrucciones
        //
        const instrucciones_1 = crearInstrucciones(
            'Instrucciones Parte 1.a',
            [
                'Describí todo lo que está pasando en la imagen en 1 minuto. Pensá que se la estás describiendo a alguien que no puede verla.',
                'Cuando termines, presioná <b>Enviar</b> para guardar tus resultados y pasar a la siguiente imagen.',
                'Si te excedés del tiempo, el experimento pasará directamente a la siguiente imagen.'
            ]
        );

        const parte1_medio = crearInstrucciones(
            'Instrucciones Parte 1.b',
            ['Como en la Parte 1a describí todo lo que está pasando en la imagen en 1 minuto, como si se la explicaras a alguien que no puede verla.'],
            'Siguiente'
        );

        const instrucciones_2 = crearInstrucciones(
            'Instrucciones Parte 2',
            [
                'Esta parte consiste de varias subpartes. En cada una te pedimos que en 1 minuto nos cuentes una memoria situada en un momento especifico de tu vida',
                'En cuanto veas cada pregunta el tiempo ha comenzado. Cuando termines, presioná <b>Enviar</b> para guardar tus resultados.',
                'Si te excedés del tiempo, el experimento pasará directamente a la siguiente consigna.'
            ]
        );
       
        const instrucciones_3 = crearInstrucciones(
            'Instrucciones Parte 2a',
            [
                'Desarrolla una historia con inicio, desarrollo y desenlace basada en lo que ves.',
                'Cuando termines, presioná <b>Enviar</b> para guardar tus resultados.',
                'Si te excedés del tiempo, el experimento pasará directamente a la siguiente parte.',
                'Cuando finalices con la imagen te pedimos que contestes un pequeño formulario.',
            ]
        );

        //
        // Bloque 1 Cookie Jar
        //
        const lamina_cookie_original = crearTrialImagen('lamina_original.jpeg', 'lamina_cookie_original', 60);
        const lamina_cookie_nueva = crearTrialImagen('lamina_nueva.png', 'lamina_cookie_nueva', 60)
        // Aleatorización de las dos variantes de CookieJar (Original vs Nueva)
        const bloque_laminas_aleatorio = jsPsych.randomization.shuffle([lamina_cookie_original, lamina_cookie_nueva]);
        
        //
        //Bloque 2: Tareas de memoria autobigrafica
        //
        const autobiografica_1 = crearTrialMemoria('autobiografica_1', 'tu <b>infancia</b> (hasta las 12 años)', 60)
        const autobiografica_2 = crearTrialMemoria('autobiografica_2', 'tu <b>adolescencia</b> (desde los 12 hasta los 20)', 60)
        const autobiografica_3 = crearTrialMemoria('autobiografica_3', 'tu <b>adultez temprana</b> (desde los 20 hasta los 39)', 60)
        const autobiografica_4 = crearTrialMemoria('autobiografica_4', 'tu <b>adultez media</b> (desde los 39 hasta los 65)', 60)
        const autobiografica_5 = crearTrialMemoria('autobiografica_5', 'el <b>año pasado</b>', 60)
        
        // Lógica condicional: Filtro para mayores de 40 años (Adultez Media)
        const pregunta_edad = {
            type: jsPsychHtmlButtonResponse,
            stimulus: '<h2>Antes de continuar:</h2><p style="font-size: 1.2rem;">¿Tenés 40 años o más?</p>',
            choices: ['No, tengo menos de 40', 'Sí, tengo 40 o más'],
            data: { tipo_trial: 'filtro_edad' }
        };

        const nodo_adultez_media = {
            timeline: [autobiografica_4],
            conditional_function: () => {
                const ensayo_edad = jsPsych.data.get().filter({ tipo_trial: 'filtro_edad' }).values()[0];
                return ensayo_edad && ensayo_edad.response === 1;
            }
        };
        
        //
        //Bloque 3: Bombero - Estado de Animo
        //
        const lamina_bombero = crearTrialImagen('lamina_bombero.png', 'lamina_bombero', 60);
        const evaluacion_sam_unificada = crearTrialEvaluacionEmocional('post_bombero_oasis_strict');

        // Pagina final de cierre y guardado
        const fin = {
            type: jsPsychHtmlButtonResponse,
            stimulus: '<h1>¡Muchas gracias!</h1><p>Tus respuestas fueron guardadas.</p>',
            choices: [],
            on_load: () => {
                apagarCamaraYMicofono();
                finishExperiment();
            }
        };

        jsPsych.run([
            bienvenida,
            pantalla,
            calibracion,
            instrucciones_1,
            bloque_laminas_aleatorio[0],
            parte1_medio,
            bloque_laminas_aleatorio[1],
            instrucciones_2,
            autobiografica_1,
            autobiografica_2,
            autobiografica_3,
            pregunta_edad,
            nodo_adultez_media,
            autobiografica_5,
            instrucciones_3,
            lamina_bombero,
            evaluacion_sam_unificada,
            fin
        ]);
    </script>
</body>

</html>
