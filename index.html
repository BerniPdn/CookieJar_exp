<!DOCTYPE html>
<html>

<head>
    <title>Experimento CookieJar</title>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.0.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet">
    <script src="runtime.js"></script>
    <script src="recorder.js"></script>
</head>

<body>
    <script>

        const jsPsych = initJsPsych();
        if (!run_id) {
            console.warn("ALERTA: No se detectó ningún 'run-id' en la URL. Las llamadas a la API van a fallar.");
        }

        // Helpers

        function crearTrialImagen(src, nombreArchivo = null, tiempo) {
            return {
                type: jsPsychHtmlButtonResponse,
                stimulus: /*html*/ `c
                    <div style="width: 100%; max-width: 700px; margin: 0 auto 30px auto; text-align: center;">
                        <h2 style="margin: 0; display: inline-block;">Imagen a utilizar</h2>
                    </div>
                    
                    <div style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
                        <span id="timer-display" style="font-size: 1.25rem; font-weight: bold; background: #eee; padding: 8px 15px; border-radius: 5px; color: #333; white-space: nowrap; border: 1px solid #ccc;">
                            Tiempo restante: ${tiempo}s
                        </span>
                    </div>

                    <img src="${src}" style="width: 700px; border-radius: 10px; margin: 20px 0;">
                `,
                choices: ['Enviar'],
                trial_duration: tiempo * 1000,
                on_load: () => { 
                    comenzarGrabacion()
                    iniciarTimerVisual(tiempo);
                },
                on_finish: (data) => { 
                    if (nombreArchivo) {
                        frenarYEnviarServidor(nombreArchivo); 
                        recordData({
                            trial: nombreArchivo,
                            rt: data.rt,
                            timeout: data.rt === null
                        });
                    }
                }
            };
        }

        function crearTrialMemoria(nombreArchivo, periodo, tiempo) {
            return {
                type: jsPsychHtmlButtonResponse,
                stimulus: /*html*/ `
                    <div style="width: 100%; max-width: 700px; margin: 0 auto 30px auto; text-align: center;">
                        <h2 style="margin: 0; display: inline-block;">Memoria autobiografica situada en ${periodo}</h2>
                    </div>

                    <div style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
                        <span id="timer-display" style="font-size: 1.25rem; font-weight: bold; background: #eee; padding: 8px 15px; border-radius: 5px; color: #333; white-space: nowrap; border: 1px solid #ccc;">
                            Tiempo restante: ${tiempo}s
                        </span>
                    </div>

                    <p style="text-align: center; margin-top: 20px;"> ¿Puedes contarnos sobre un evento en un lugar y tiempo especifico situado en: ${periodo}? </p>
                `,
                choices: ['Enviar'],
                trial_duration: tiempo * 1000,
                on_load: () => { 
                    comenzarGrabacion()
                    iniciarTimerVisual(tiempo);
                },
                data: { trial_id: nombreArchivo, periodo_solicitado: periodo },
                on_finish: (data) => { 
                    if (nombreArchivo) {
                        frenarYEnviarServidor(nombreArchivo); 
                        recordData({
                            trial: nombreArchivo,
                            rt: data.rt,
                            timeout: data.rt === null
                        });
                    }
                }
            };
        }

        function crearInstrucciones(titulo, parrafos, boton = 'Entendido, continuar') {
            const items = parrafos.map((p, i) => `<p>${i + 1}. ${p}</p>`).join('');
            return {
                type: jsPsychHtmlButtonResponse,
                stimulus: `<h2>${titulo}</h2>${items}`,
                choices: [boton]
            };
        }

         // Trials

        const bienvenida = {
            type: jsPsychHtmlButtonResponse,
            stimulus: /*html*/ `
                <h2>¡Te damos la bienvenida al experimento!</h2>
                <h3>Este experimento consiste de 3 partes. Para evitar distracciones te pedimos que:</h3>
                <p>1. Cierres otras pesatañas y aplicaciones que generen notificaciones</p>
                <p>2. Pongas el telefono en modo no molestar</p>
                <p>3. Minimices distracciones de tu entorno, intenando estar en un lugar tranquilo</p>
            `,
            choices: ['Siguiente']
        }

        const pantalla = {
            type: jsPsychFullscreen,
            fullscreen_mode: true,
            message: '<h3>El experimento ira a pantalla completa cuando presiones el boton que se encuentra abajo</h3>',
            button_label: 'Ir a pantalla completa'
        }

        const calibracion = {
            type: jsPsychHtmlButtonResponse,
            stimulus: /*html*/ `
                <h2>Verificación de micrófono</h2>
                <p>Hablá en voz alta y fijate que la barra se mueva. Si la barra no se mueve intenta hablar un poco mas fuerte.</p> 
                <div style="width: 600px; margin: 20px auto;">
                    <div id="barra-container" style="background: #eee; border-radius: 8px; height: 50px; overflow: hidden;">
                        <div id="barra-audio" style="height: 100%; width: 0%; background: green; transition: width 0.1s;"></div>
                    </div>
                </div>

                <br> 

                <h2>Verificación de cámara</h2>
                <p>Asegurate que tu cara este en el cuadrado verde que aparece en la pantalla de abajo e intenta no moverte
                    mucho durante el experimento</p>
                    
                    <div id="contenedor-camara"
                        style="
                            position: relative;
                            width: 600px;
                            height: 375px;
                            margin: 0 auto;
                            background: #ddd;
                            border-radius: 8px;
                            overflow: hidden;
                        ">

                        <video id="preview-camara" 
                            autoplay 
                            muted 
                            playsinline
                            style="
                                width: 100%;
                                height: 100%;
                                object-fit: cover;
                                visibility: hidden;
                            ">
                        </video>

                        <div id="cuadrado-camara" 
                            style="
                                position: absolute;
                                top: 50%;
                                left: 50%;
                                width: 300px;
                                height: 300px;
                                border: 4px solid green;
                                transform: translate(-50%, -50%);
                                border-radius: 10px;
                                pointer-events: none;
                                display: none;
                            ">
                        </div>

                    </div>

                <p id="estado-mic-cam" style="color: gray;">Iniciando micrófono y camara...</p>
                <button id="btn-calibracion" class="jspsych-btn" disabled>
                    Calibración de audio y cámara lista
                </button>
            `,
            choices: [],

            on_load: function () {
                navigator.mediaDevices.getUserMedia({ audio: true, video: true })
                    .then(function (stream) {
                        document.getElementById('estado-mic-cam').textContent = 'Micrófono y camara activos.';
                        document.getElementById('estado-mic-cam').style.color = 'green';
                        document
                            .getElementById('btn-calibracion')
                            .addEventListener('click', function () {
                                jsPsych.finishTrial();
                            });

                        const video = document.getElementById('preview-camara');
                        video.srcObject = stream;
                        video.onloadedmetadata = function () {
                            video.style.visibility = 'visible';
                            document.getElementById('cuadrado-camara').style.display = 'block';
                        };

                        const audioContext = new AudioContext();
                        const source = audioContext.createMediaStreamSource(stream);
                        const analyser = audioContext.createAnalyser();
                        analyser.fftSize = 256;
                        source.connect(analyser);

                        const dataArray = new Uint8Array(analyser.frequencyBinCount);

                        // Calibracion del audio
                        function updateBar() {
                            analyser.getByteFrequencyData(dataArray);

                            // Promedio de volumen de todo sonido captado por el microfono
                            let sum = 0;
                            for (let i = 0; i < dataArray.length; i++) {
                                sum += dataArray[i];
                            }
                            const promedio = sum / dataArray.length;

                            // Promedio de sonidos - tratando de account for el ruioo de fondo
                            const porcentaje = Math.max(0, Math.min((promedio - 30) * 3, 100)); //Fijarse si el 40 sirve

                            document.getElementById('barra-audio').style.width = porcentaje + '%';

                            //Habilitar boton si el promedio se mueve bien con la voz
                            if (porcentaje > 40) {
                                document.getElementById('btn-calibracion').disabled = false;
                            }

                            requestAnimationFrame(updateBar);
                        }
                        updateBar();
                        inicializarGrabador(stream);
                    })
                    .catch(function () {
                        document.getElementById('estado-mic-cam').textContent = 
                            'No se pudo acceder al micrófono y/o la camara. Revisá los permisos.';
                        document.getElementById('estado-mic-cam').style.color = 'red';
                    });
            }
        }

        const instrucciones_1 = crearInstrucciones(
            'Instrucciones Parte 1a',
            [
                'Describí todo lo que está pasando en la imagen en 1 minuto. Pensá que se la estás describiendo a alguien que no puede verla.',
                'Cuando termines, presioná <b>Enviar</b> para guardar tus resultados y pasar a la siguiente imagen.',
                'Si te excedés del tiempo, el experimento pasará directamente a la siguiente imagen.'
            ]
        );

        const parte1_medio = crearInstrucciones(
            'Parte 1b',
            ['Como en la Parte 1a describí todo lo que está pasando en la imagen en 1 minuto, como si se la explicaras a alguien que no puede verla.'],
            'Siguiente'
        );

        const instrucciones_2 = crearInstrucciones(
            'Instrucciones Parte 2',
            [
                'Desarrollá una historia con inicio, desarrollo y desenlace basada en lo que ves.',
                'Cuando termines, presioná <b>Enviar</b> para guardar tus resultados.',
                'Si te excedés del tiempo, el experimento pasará directamente a la siguiente parte.'
            ]
        );

        const instrucciones_3 = crearInstrucciones(
            'Instrucciones Parte 3',
            [
                'Esta ultima parte consiste de varias subpartes. En cada una te pedimos que en 1 minuto nos cuentes una memoria situada en un momento especifico de tu vida',
                'Cuando termines, presioná <b>Enviar</b> para guardar tus resultados.',
                'Si te excedés del tiempo, el experimento pasará directamente a la siguiente consigna.'
            ]
        );

        const lamina_cookie_original = crearTrialImagen('lamina_original.jpeg', 'lamina_cookie_original', 60);
        const lamina_cookie_nueva = crearTrialImagen('lamina_nueva.png', 'lamina_cookie_nueva', 60);
        const lamina_bombero = crearTrialImagen('lamina_bombero.png', 'lamina_bombero', 60);
        const bloque_laminas_aleatorio = jsPsych.randomization.shuffle([lamina_cookie_original, lamina_cookie_nueva]);
        const autobiografica_1 = crearTrialMemoria('autobiografica_1', 'tu <b>infancia</b> (hasta las 12 años)', 60)
        const autobiografica_2 = crearTrialMemoria('autobiografica_2', 'tu <b>adolescencia</b> (desde los 12 hasta los 20)', 60)
        const autobiografica_3 = crearTrialMemoria('autobiografica_3', 'tu <b>adultez temprana</b> (desde los 20 hasta los 39)', 60)
        const autobiografica_4 = crearTrialMemoria('autobiografica_4', 'tu <b>adultez media</b> (desde los 39 hasta los 65)', 60)
        const autobiografica_5 = crearTrialMemoria('autobiografica_5', 'el <b>año pasado</b>', 60)

        const pregunta_edad = {
            type: jsPsychHtmlButtonResponse,
            stimulus: '<h2>Antes de continuar:</h2><p style="font-size: 1.2rem;">¿Tenés 40 años o más?</p>',
            choices: ['No, tengo menos de 40', 'Sí, tengo 40 o más'],
            data: { tipo_trial: 'filtro_edad' }
        };

        const nodo_adultez_media = {
            timeline: [autobiografica_4],
            conditional_function: function() {
                const datos_edad = jsPsych.data.get().last(1).values()[0];
                if (datos_edad.response === 1) {
                    return true;
                } else {
                    return false;
                }
            }
        };

        const fin = {
            type: jsPsychHtmlButtonResponse,
            stimulus: '<h1>¡Muchas gracias!</h1><p>Tus respuestas fueron guardadas.</p>',
            choices: [],
            on_load: function () {
                apagarCamaraYMicofono();
                finishExperiment()
            }
        }

        jsPsych.run([
            bienvenida,
            pantalla,
            calibracion,
            instrucciones_1,
            bloque_laminas_aleatorio[0],
            parte1_medio,
            bloque_laminas_aleatorio[1],
            instrucciones_2,
            lamina_bombero,
            instrucciones_3,
            autobiografica_1,
            autobiografica_2,
            autobiografica_3,
            pregunta_edad,
            nodo_adultez_media,
            autobiografica_5,
            fin
        ]);
    </script>
</body>

</html>
